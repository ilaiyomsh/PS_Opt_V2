<html lang="en">

<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5}
#canvas-wrap{width:100%;height:100%;cursor:grab;position:relative}
#canvas-wrap.grabbing{cursor:grabbing}
svg{display:block}
/* toolbar */
#toolbar{position:fixed;top:16px;left:16px;z-index:10;display:flex;gap:8px;align-items:center}
#toolbar button{width:36px;height:36px;border:1px solid #d1d5db;border-radius:8px;background:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#374151;box-shadow:0 1px 3px rgba(0,0,0,.08)}
#toolbar button:hover{background:#f3f4f6}
#zoom-label{font-size:12px;color:#6b7280;background:#fff;padding:4px 10px;border-radius:6px;border:1px solid #d1d5db;min-width:50px;text-align:center}
/* legend */
#legend{position:fixed;top:16px;right:16px;z-index:10;background:#fff;border:1px solid #d1d5db;border-radius:10px;padding:12px 16px;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:12px;display:flex;flex-direction:column;gap:5px;transition:right .25s ease}
body:has(#detail-panel.open) #legend{right:336px}
#legend .row{display:flex;align-items:center;gap:6px}
#legend .dot{width:12px;height:12px;border-radius:3px;border:2px solid;flex-shrink:0}
/* title */
#title-bar{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;background:#fff;border:1px solid #d1d5db;border-radius:10px;padding:8px 24px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center;pointer-events:none}
#title-bar h1{font-size:15px;font-weight:700;color:#1e293b}
#title-bar p{font-size:11px;color:#64748b}
/* detail panel */
#detail-panel{position:fixed;top:0;right:0;width:320px;height:100%;z-index:20;background:#fff;border-left:1px solid #d1d5db;box-shadow:-4px 0 16px rgba(0,0,0,.08);transform:translateX(100%);transition:transform .25s ease;overflow-y:auto;display:flex;flex-direction:column}
#detail-panel.open{transform:translateX(0)}
#detail-panel .dp-header{padding:16px 16px 12px;position:relative}
#detail-panel .dp-header .dp-mod-tag{font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:2px 8px;border-radius:4px;display:inline-block;margin-bottom:6px}
#detail-panel .dp-header .dp-fn-name{font-size:16px;font-weight:700;font-family:Consolas,"SF Mono",monospace;color:#1e293b;word-break:break-all}
#detail-panel .dp-header .dp-sub{font-size:12px;color:#64748b;margin-top:4px}
#detail-panel .dp-close{position:absolute;top:12px;right:12px;width:28px;height:28px;border:1px solid #d1d5db;border-radius:6px;background:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b}
#detail-panel .dp-close:hover{background:#f3f4f6;color:#1e293b}
#detail-panel .dp-section{padding:0 16px 14px}
#detail-panel .dp-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#94a3b8;margin-bottom:6px;border-top:1px solid #e5e7eb;padding-top:10px}
#detail-panel .dp-section ul{margin:0;padding:0 0 0 16px;font-size:12px;color:#374151;line-height:1.6}
#detail-panel .dp-section p{margin:0;font-size:12px;color:#374151;line-height:1.5}
#detail-panel .dp-conn-link{color:#2563eb;cursor:pointer;font-family:Consolas,"SF Mono",monospace;font-size:11px;text-decoration:none}
#detail-panel .dp-conn-link:hover{text-decoration:underline}
#detail-panel .dp-conn-row{display:flex;align-items:center;gap:6px;margin-bottom:3px;font-size:12px;color:#64748b}
#detail-panel .dp-conn-arrow{font-size:10px;flex-shrink:0;width:16px;text-align:center}
</style>
</head>
<body>

<div id="toolbar">
  <button id="btn-zin" title="Zoom in">+</button>
  <button id="btn-zout" title="Zoom out">&minus;</button>
  <span id="zoom-label">100%</span>
  <button id="btn-fit" title="Fit to screen">&#11034;</button>
  <button id="btn-reset" title="Reset view">R</button>
</div>

<div id="title-bar"><h1>PS_Opt_V2 &mdash; Function-Level Architecture</h1><p>PIN Diode Phase Shifter Optimization &bull; Click: details &bull; Pan: drag &bull; Zoom: scroll</p></div>

<div id="legend">
  <div class="row"><div class="dot" style="background:#eff6ff;border-color:#2563eb"></div>main.py</div>
  <div class="row"><div class="dot" style="background:#f0fdf4;border-color:#16a34a"></div>run_simulation.py</div>
  <div class="row"><div class="dot" style="background:#fef2f2;border-color:#dc2626"></div>sim_handler.py</div>
  <div class="row"><div class="dot" style="background:#f5f3ff;border-color:#7c3aed"></div>data_processor.py</div>
  <div class="row"><div class="dot" style="background:#fffbeb;border-color:#d97706"></div>cost.py</div>
  <div class="row"><div class="dot" style="background:#ecfeff;border-color:#0891b2"></div>BO.py</div>
  <div class="row"><div class="dot" style="background:#fdf2f8;border-color:#db2777"></div>LHS.py</div>
  <div class="row"><div class="dot" style="background:#f1f5f9;border-color:#94a3b8"></div>CSV file</div>
</div>

<div id="canvas-wrap">

</div>

<div id="detail-panel">
  <div class="dp-header">
    <button class="dp-close" id="dp-close" title="Close">&times;</button>
    <span class="dp-mod-tag" id="dp-mod-tag"></span>

    <div class="dp-section-title">Inputs</div>
    <ul id="dp-inputs"></ul>
  </div>
  <div class="dp-section" id="dp-output-sec">
    <div class="dp-section-title">Output</div>
    <p id="dp-output"></p>
  </div>

    <div class="dp-section-title">Logic</div>
    <p id="dp-logic"></p>

    <div class="dp-section-title">Connections</div>
    <div id="dp-connections"></div>
  </div>

<script>
// ===================== DATA =====================

const MOD = {
  main:   { fill:'#eff6ff', stroke:'#2563eb', text:'#1e40af' },
  runsim: { fill:'#f0fdf4', stroke:'#16a34a', text:'#166534' },
  simh:   { fill:'#fef2f2', stroke:'#dc2626', text:'#991b1b' },
  dp:     { fill:'#f5f3ff', stroke:'#7c3aed', text:'#5b21b6' },
  cost:   { fill:'#fffbeb', stroke:'#d97706', text:'#92400e' },
  bo:     { fill:'#ecfeff', stroke:'#0891b2', text:'#155e75' },
  lhs:    { fill:'#fdf2f8', stroke:'#db2777', text:'#9d174d' },
  file:   { fill:'#f1f5f9', stroke:'#94a3b8', text:'#475569' },
};

const N = {};
function n(id, x, y, w, h, mod, label, sub, details) { N[id] = {id,x,y,w,h,mod,label,sub:sub||'',details:details||null}; }

// ---- Row 0 (y=30): Entry point ----
n('main',        680, 30, 260, 56, 'main', 'main()', 'Entry point \u2014 orchestrates 4-stage optimization pipeline', {
  inputs: [],
  outputs: 'None',
  logic: '4-stage pipeline: (1) LHS sampling or skip, (2) run initial sims or skip, (3) BO loop: train once then suggest\u2192simulate\u2192register, (4) print final results'
});
n('setup_log',  1040, 30, 220, 46, 'main', 'setup_logging()', 'Dual console + file logging', {
  inputs: [],
  outputs: 'str \u2014 log file path',
  logic: 'Creates logs/ dir, configures dual logging (console INFO + file) with timestamps'
});

// ---- Row 1 (y=140): Stage functions from main ----
n('skip_init',   100, 140, 280, 56, 'main', '_skip_initial()', 'Load existing result.csv (skip LHS+sims)', {
  inputs: ['results_path: str'],
  outputs: 'None',
  logic: 'Reads existing result.csv, logs row count and valid count. Used when SKIP_INITIAL_SIMS=True.'
});
n('run_initial',  440, 140, 310, 56, 'main', '_run_initial()', 'LHS sampling + initial simulations', {
  inputs: ['params_path: str', 'results_path: str'],
  outputs: 'None',
  logic: 'Calls LHS.generate_lhs_samples() then run_simulation.run_init_file(). Logs summary of valid/failed.'
});
n('run_bo_loop',  820, 140, 300, 56, 'main', '_run_bo_loop()', 'Train BO once, then suggest\u2192sim\u2192register loop', {
  inputs: ['results_path: str'],
  outputs: 'None',
  logic: 'Trains optimizer ONCE with all existing results. Then loops: get_next_sample \u2192 run_row \u2192 register_result. Calls _log_bo_result and get_best_result each iteration.'
});
n('print_final', 1200, 140, 290, 56, 'main', '_print_final_results()', 'Print best result summary table', {
  inputs: ['results_path: str'],
  outputs: 'None',
  logic: 'Reads result.csv, counts valid/invalid, calls BO.get_best_result(), prints formatted table of best parameters and metrics.'
});

// ---- Row 2 (y=280): LHS, run_init_file, train_optimizer ----
n('gen_lhs',      120, 280, 320, 56, 'lhs', 'generate_lhs_samples()', 'LHS in 6D param space \u2192 params.csv', {
  inputs: ['start_sim_id: int (optional, default 1)'],
  outputs: 'DataFrame \u2014 LHS samples',
  logic: 'Generates Latin Hypercube samples in 6D parameter space using scipy or SMT. Scales to config bounds, rounds to 4 sig figs, adds sim_id + units row, saves to params.csv.'
});
n('run_init_file',540, 280, 310, 56, 'runsim', 'run_init_file()', 'Read params.csv, loop run_row() per row', {
  inputs: ['params_csv_path: str (optional)', 'logger_func: callable (optional)'],
  outputs: 'str \u2014 results CSV path',
  logic: 'Reads params.csv, loops run_row() for each row, tracks success/failure counts, prints summary.'
});
n('train_opt',    960, 280, 290, 56, 'bo', 'train_optimizer()', 'Register (params, \u2212log(cost)) into GP model', {
  inputs: ['result_csv_path: str (optional)'],
  outputs: 'BayesianOptimization object',
  logic: 'Reads result.csv, normalizes params to [0,1], log-transforms cost, registers each point with GP+UCB. Created ONCE and reused.'
});

// ---- Row 3 (y=400): params.csv, get_next_sample, register_result, get_best_result ----
n('f_params',     180, 400, 150, 38, 'file', 'params.csv');
n('suggest',      560, 400, 290, 56, 'bo', 'get_next_sample()', 'optimizer.suggest() \u2192 denormalize \u2192 clip', {
  inputs: ['optimizer: BayesianOptimization'],
  outputs: 'dict or None \u2014 next params in raw scale',
  logic: 'Calls optimizer.suggest() in [0,1] space, denormalizes back to raw scale, clips to config bounds.'
});
n('register',     920, 400, 290, 56, 'bo', 'register_result()', 'normalize + \u2212log(cost) \u2192 register', {
  inputs: ['optimizer: BayesianOptimization', 'params: dict (raw scale)', 'cost_value: float (positive)'],
  outputs: 'None',
  logic: 'Normalizes params to [0,1], registers with target = \u2212log(cost_value).'
});
n('get_best',    1280, 400, 260, 50, 'bo', 'get_best_result()', 'Lowest cost row from result.csv', {
  inputs: ['result_csv_path: str (optional)'],
  outputs: 'dict or None \u2014 best result row',
  logic: 'Reads CSV, drops NaN cost rows, returns row with minimum cost value.'
});

// ---- Row 4 (y=530): run_row (central hub) ----
n('run_row',      560, 530, 420, 66, 'runsim', 'run_row(row, sim_id, is_last)', 'Single sim pipeline: sim \u2192 process \u2192 build \u2192 save \u2192 cool', {
  inputs: ['row: Series/dict', 'sim_id: int (optional)', 'is_last: bool (optional)'],
  outputs: 'dict or None',
  logic: 'Pipeline: (1) run_full_simulation, (2) process_charge_data + process_optical_data, (3) _build_result, (4) save_single_result_to_csv, (5) cooling_delay. On error: save_error_to_csv and return None.'
});

// ---- Row 5 (y=670): run_full_simulation, save_error_to_csv ----
n('full_sim',     530, 670, 420, 56, 'simh', 'run_full_simulation(params, sim_id)', 'CHARGE\u2192FDE pipeline with session lifecycle', {
  inputs: ['params: dict', 'sim_id: int (optional)'],
  outputs: '(DataFrame, raw_csv_path, timing) \u2014 raw data + path + timing dict',
  logic: 'Opens CHARGE session: set_params \u2192 run \u2192 extract \u2192 close. Opens FDE session: set_params \u2192 import_charge \u2192 sweep \u2192 extract \u2192 close. Builds combined DataFrame, saves raw CSV. Raises SimulationError on failure.'
});
n('save_error',   100, 670, 270, 50, 'runsim', 'save_error_to_csv()', '\u2192 errors.csv', {
  inputs: ['sim_id: int', 'stage: str', 'error: Exception', 'params: dict (optional)'],
  outputs: 'None',
  logic: 'Records sim_id, stage, error type/message, traceback, timestamp, params JSON to errors.csv.'
});

// ---- Row 6 (y=810-960): CHARGE cluster (left) ----
n('set_charge',    60, 840, 310, 48, 'simh', 'set_charge_parameters()', 'Geometry, doping, contacts, monitor', {
  inputs: ['charge_session', 'params: dict', 'charge_file_path: str'],
  outputs: 'None',
  logic: 'Sets waveguide/pad geometry (w_r, h_si), contact z_min, doping regions (source_nwell, drain_pwell with S offset), nplus/pplus ohmic contacts, monitor output path.'
});
n('run_charge',    60, 910, 290, 48, 'simh', 'run_charge_simulation()', 'Save \u2192 mesh \u2192 run solver \u2192 verify', {
  inputs: ['charge_session'],
  outputs: 'None',
  logic: 'Saves .ldev file, generates mesh, runs CHARGE solver, verifies results exist (V_drain, n, p arrays).'
});
n('ext_charge',    60, 980, 320, 48, 'simh', 'extract_raw_charge_data()', 'getresult("total_charge") \u2192 flatten', {
  inputs: ['charge_session'],
  outputs: 'dict {V_drain, n, p} \u2014 flattened arrays',
  logic: 'getresult("CHARGE::monitor_charge","total_charge") \u2192 flatten V_drain, n, p arrays.'
});

// ---- Row 6 (y=810-960): FDE cluster (right) ----
n('set_fde',      820, 840, 280, 48, 'simh', 'set_fde_parameters()', 'Geometry + wavelength on FDE', {
  inputs: ['fde_session', 'params: dict'],
  outputs: 'None',
  logic: 'Sets wavelength on FDE solver, sets geometry (waveguide, pad, contacts, oxide) matching CHARGE layout.'
});
n('imp_charge',   820, 910, 300, 48, 'simh', 'import_charge_data()', 'Import .mat charge data into FDE', {
  inputs: ['fde_session', 'charge_file_path: str'],
  outputs: 'None',
  logic: 'Selects ::model::np object, resolves charge data path, calls importdataset to load carrier distributions.'
});
n('run_fde',     1180, 910, 260, 48, 'simh', 'run_fde_sweep()', 'Save \u2192 mesh \u2192 sweep \u2192 verify', {
  inputs: ['fde_session'],
  outputs: 'None',
  logic: 'Saves .lms file, generates mesh, runs voltage sweep, verifies neff results exist and are non-empty.'
});
n('ext_optical',  900, 980, 330, 48, 'simh', 'extract_raw_optical_data()', 'getsweepresult("neff") \u2192 squeeze', {
  inputs: ['fde_session'],
  outputs: 'dict {neff} \u2014 squeezed complex array',
  logic: 'getsweepresult("voltage","neff") \u2192 np.squeeze to get 1D complex neff array.'
});

// ---- Row 7 (y=1040): process_charge_data, process_optical_data ----
n('proc_charge',   60, 1040, 320, 56, 'dp', 'process_charge_data(V, n, p)', 'Q=e\u00b7n \u2192 C=dQ/dV \u2192 pF/cm', {
  inputs: ['V_drain: array', 'n: array', 'p: array', 'sim_id: int (optional)'],
  outputs: '(V, C_total_pF_cm) \u2014 tuple of arrays',
  logic: 'Q = e\u00b7carriers \u2192 C = dQ/dV for electrons and holes \u2192 C_total = Cn+Cp \u2192 convert to pF/cm (*1e10). Optionally plots.'
});
n('proc_optical',  850, 1040, 340, 56, 'dp', 'process_optical_data(neff, L, \u03bb)', 'Calls calc_dneff, calc_alpha, calc_dphi, calculate_v_pi', {
  inputs: ['neff: complex[]', 'length: float', 'wavelength: float', 'sim_id: int (optional)'],
  outputs: '(d_neff, alpha_dB_per_cm, d_phi, v_pi, max_dphi) \u2014 tuple',
  logic: 'Reconstructs V from config. Calls calc_dneff, calc_alpha, calc_dphi, calculate_v_pi. Returns processed arrays + v_pi + max_dphi. Optionally plots.'
});

// ---- Row 8 (y=1170): calc sub-functions ----
n('calc_dneff',   700, 1170, 220, 46, 'dp', 'calc_dneff(neff)', 'Re(neff \u2212 neff[0])', {
  inputs: ['neff: complex[]'],
  outputs: 'array \u2014 Re(neff \u2212 neff[0])',
  logic: 'Real part of effective index change relative to zero-bias value.'
});
n('calc_alpha',   960, 1170, 240, 46, 'dp', 'calc_alpha(neff, \u03bb)', '2k\u2080\u00b7Im(neff)\u00b7(10/ln10)\u00b71e\u22122', {
  inputs: ['neff: complex[]', 'wavelength: float (m)'],
  outputs: 'array \u2014 optical loss in dB/cm',
  logic: 'k\u2080 = 2\u03c0/\u03bb, then \u03b1 = 2\u00b7k\u2080\u00b7Im(neff)\u00b7(10/ln10)\u00b71e\u22122. Converts from Np/m to dB/cm.'
});
n('calc_dphi',   1240, 1170, 220, 46, 'dp', 'calc_dphi(\u0394n, L, \u03bb)', '2\u03c0\u00b7\u0394neff\u00b7L / \u03bb', {
  inputs: ['d_neff: array', 'length: float (m)', 'wavelength: float (m)'],
  outputs: 'array \u2014 phase shift (rad)',
  logic: '\u0394\u03c6 = 2\u03c0\u00b7\u0394neff\u00b7L / \u03bb'
});
n('calc_vpi',    1000, 1280, 260, 46, 'dp', 'calculate_v_pi(V, |d\u03c6|)', 'interp(\u03c0, |d\u03c6|, V) or NaN', {
  inputs: ['voltages: array', 'abs_dphi: array'],
  outputs: 'float \u2014 V_pi or NaN',
  logic: 'If max(|d\u03c6|) \u2265 \u03c0: np.interp to find voltage at \u03c0 phase shift; else NaN.'
});

// ---- Row 9 (y=1310): _build_result ----
n('build',        560, 1380, 400, 56, 'runsim', '_build_result(...)', 'interp at v_pi (or worst-case) \u2192 cost \u2192 result dict', {
  inputs: ['sim_id', 'params', 'timing', 'V_cap', 'C_total_pF_cm', 'd_neff', 'alpha', 'd_phi', 'v_pi', 'max_dphi', 'total_time'],
  outputs: 'dict \u2014 complete result with all metrics',
  logic: 'If valid (v_pi exists): interp loss/capacitance at v_pi, v_pi_l = v_pi*L. If failed: worst-case loss, v_pi_l = V_MAX*L. Calls calculate_cost with same formula for both cases. Builds full result dict.'
});

// ---- Row 10 (y=1430): calculate_cost, save_single_result_to_csv, cooling_delay ----
n('calc_cost',    440, 1500, 300, 56, 'cost', 'calculate_cost(\u03b1, v_pi_l)', 'w\u00b7(\u03b1/t) + w\u00b7(v/t), returns \u2212cost', {
  inputs: ['alpha: float', 'v_pi_l: float', 'weights: tuple (optional)', 'targets: tuple (optional)'],
  outputs: 'float \u2014 negative cost (for BO maximization)',
  logic: 'Linear FOM: w_loss*(alpha/target_loss) + w_vpil*(v_pi_l/target_vpil). Same formula for valid and failed sims. Returns \u2212cost.'
});
n('save_result',  820, 1500, 340, 50, 'runsim', 'save_single_result_to_csv()', 'Write minimal + full CSV files', {
  inputs: ['filename: str', 'result: dict'],
  outputs: 'None',
  logic: 'Reorders columns (sim_id, inputs, outputs). Calls _save_to_csv twice: once for result.csv (MINIMAL_RESULT_COLUMNS) and once for result_full.csv (all columns).'
});
n('cooling',     1240, 1500, 240, 46, 'runsim', 'cooling_delay(skip)', 'Sleep DELAY_BETWEEN_RUNS seconds', {
  inputs: ['skip: bool (optional)'],
  outputs: 'None',
  logic: 'Pauses DELAY_BETWEEN_RUNS seconds with countdown. Skipped if delay \u22640 or skip=True or is_last simulation.'
});

// ---- Row 11 (y=1550): _save_to_csv, CSV file outputs ----
n('save_csv_min', 700, 1620, 260, 44, 'runsim', '_save_to_csv()', '\u2192 result.csv (minimal columns)', {
  inputs: ['filename: str', 'result_df: DataFrame', 'columns: list (optional)'],
  outputs: 'None',
  logic: 'Appends single-row DataFrame to CSV. Creates with header if new, matches existing column order if appending.'
});
n('save_csv_full',1020, 1620, 270, 44, 'runsim', '_save_to_csv()', '\u2192 result_full.csv (all columns)', {
  inputs: ['filename: str', 'result_df: DataFrame', 'columns: list (optional)'],
  outputs: 'None',
  logic: 'Appends single-row DataFrame to CSV. Creates with header if new, matches existing column order if appending.'
});
n('f_result',     700, 1730, 150, 38, 'file', 'result.csv');
n('f_full',      1020, 1730, 180, 38, 'file', 'result_full.csv');
n('f_errors',     100, 1730, 150, 38, 'file', 'errors.csv');

// ---- BO helper nodes (internal) ----
n('norm_params',  960, 340, 240, 40, 'bo', '_normalize_params()', 'raw \u2192 [0,1] via bounds', {
  inputs: ['params: dict (raw scale)'],
  outputs: 'dict \u2014 params normalized to [0,1]',
  logic: 'For each param: (val \u2212 min) / (max \u2212 min) using SWEEP_PARAMETERS bounds.'
});
n('denorm_params',560, 340, 240, 40, 'bo', '_denormalize_params()', '[0,1] \u2192 raw via bounds', {
  inputs: ['norm_params: dict ([0,1] scale)'],
  outputs: 'dict \u2014 params in raw scale',
  logic: 'For each param: val * (max \u2212 min) + min using SWEEP_PARAMETERS bounds.'
});
n('log_bo_res',  1200, 200, 230, 42, 'main', '_log_bo_result()', 'Log BO iteration result', {
  inputs: ['result: dict'],
  outputs: 'None',
  logic: 'Logs V_pi, V_pi*L, loss, capacitance, max_dphi for valid results; logs cost for failed results.'
});


// ===================== EDGES =====================

const edges = [];
function e(from,to,label,opts){edges.push({from,to,label:label||'',dash:opts?.dash||false,color:opts?.color||'#64748b',exitSide:opts?.exit,enterSide:opts?.enter,exitOff:opts?.exitOff||0,enterOff:opts?.enterOff||0});}

// main → stage functions
e('main','skip_init','if SKIP_INITIAL',{exit:'bottom',enter:'top',exitOff:-60});
e('main','run_initial','else',{exit:'bottom',enter:'top',exitOff:-20});
e('main','run_bo_loop','Stage 3',{exit:'bottom',enter:'top',exitOff:20});
e('main','print_final','Stage 4',{exit:'bottom',enter:'top',exitOff:60});
e('main','setup_log','',{exit:'right',enter:'left'});

e('run_initial','gen_lhs','LHS',{exit:'bottom',enter:'top',exitOff:-60});

// Group zones (labels)
function addZone(x,y,w,h,label,color){

}

// Draw edges
function getPort(node, side, off){
  const cx=node.x+node.w/2+(off||0), cy=node.y+node.h/2;
  switch(side){
    case 'top':    return {x:cx, y:node.y};
    case 'bottom': return {x:cx, y:node.y+node.h};
    case 'left':   return {x:node.x, y:cy};
    case 'right':  return {x:node.x+node.w, y:cy};
  }
}

function autoSides(a,b){
  const acx=a.x+a.w/2, acy=a.y+a.h/2, bcx=b.x+b.w/2, bcy=b.y+b.h/2;
  const dx=bcx-acx, dy=bcy-acy;
  if(Math.abs(dy)>Math.abs(dx)){
    return dy>0?['bottom','top']:['top','bottom'];
  } else {
    return dx>0?['right','left']:['left','right'];
  }
}

function markerFor(color){
  if(color==='#dc2626') return 'url(#ah-red)';
  if(color==='#0891b2') return 'url(#ah-cyan)';
  if(color==='#d97706') return 'url(#ah-amber)';
  return 'url(#ah)';
}

const edgeGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
svgEl.appendChild(edgeGroup);

edges.forEach(ed=>{
  const a=N[ed.from], b=N[ed.to];
  if(!a||!b) return;
  let [es,ns] = autoSides(a,b);
  if(ed.exitSide) es=ed.exitSide;
  if(ed.enterSide) ns=ed.enterSide;
  const p1=getPort(a,es,ed.exitOff);
  const p2=getPort(b,ns,ed.enterOff);

  // Build smooth cubic bezier
  let d;
  const dx=p2.x-p1.x, dy=p2.y-p1.y;
  if((es==='bottom'&&ns==='top')||(es==='top'&&ns==='bottom')){
    const cy1=p1.y+dy*0.45, cy2=p1.y+dy*0.55;
    d=`M${p1.x},${p1.y} C${p1.x},${cy1} ${p2.x},${cy2} ${p2.x},${p2.y}`;
  } else if((es==='right'&&ns==='left')||(es==='left'&&ns==='right')){
    const cx1=p1.x+dx*0.45, cx2=p1.x+dx*0.55;
    d=`M${p1.x},${p1.y} C${cx1},${p1.y} ${cx2},${p2.y} ${p2.x},${p2.y}`;
  } else {
    // Mixed: e.g. bottom→left
    const mid = es==='bottom'||es==='top' ?
      `C${p1.x},${p1.y+dy*0.6} ${p2.x-dx*0.1},${p2.y} ${p2.x},${p2.y}` :
      `C${p1.x+dx*0.6},${p1.y} ${p2.x},${p2.y-dy*0.1} ${p2.x},${p2.y}`;
    d=`M${p1.x},${p1.y} ${mid}`;
  }

  const path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d',d);
  path.setAttribute('fill','none');
  path.setAttribute('stroke',ed.color);
  path.setAttribute('stroke-width','1.5');
  path.setAttribute('marker-end',markerFor(ed.color));
  if(ed.dash) path.setAttribute('stroke-dasharray','6,4');
  edgeGroup.appendChild(path);

  // Label at midpoint
  if(ed.label){
    const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('x',mx); lbl.setAttribute('y',my-5);
    lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('font-size','9');
    lbl.setAttribute('font-family','Consolas, monospace');
    lbl.setAttribute('fill','#475569');
    // background rect
    const bg2=document.createElementNS('http://www.w3.org/2000/svg','rect');
    const tw=ed.label.length*5.5+8;
    bg2.setAttribute('x',mx-tw/2); bg2.setAttribute('y',my-14);
    bg2.setAttribute('width',tw); bg2.setAttribute('height',13);
    bg2.setAttribute('rx','3'); bg2.setAttribute('fill','#f8fafc'); bg2.setAttribute('opacity','0.9');
    edgeGroup.appendChild(bg2);
    lbl.textContent=ed.label;
    edgeGroup.appendChild(lbl);
  }
});

// Draw nodes
const nodeGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
svgEl.appendChild(nodeGroup);

const modNames={main:'MAIN.PY',runsim:'RUN_SIMULATION.PY',simh:'SIM_HANDLER.PY',dp:'DATA_PROCESSOR.PY',cost:'COST.PY',bo:'BO.PY',lhs:'LHS.PY'};
const nodeEls = {}; // id → { group, box }

for(const k in N){
  const nd=N[k];
  const m=MOD[nd.mod];
  const g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('data-node-id', nd.id);
  if(nd.details) g.style.cursor='pointer';

  // Shadow
  const sh=document.createElementNS('http://www.w3.org/2000/svg','rect');
  sh.setAttribute('x',nd.x+1);sh.setAttribute('y',nd.y+2);sh.setAttribute('width',nd.w);sh.setAttribute('height',nd.h);
  sh.setAttribute('rx','8');sh.setAttribute('fill','rgba(0,0,0,0.06)');
  g.appendChild(sh);

  // Box
  const r=document.createElementNS('http://www.w3.org/2000/svg','rect');
  r.setAttribute('x',nd.x);r.setAttribute('y',nd.y);r.setAttribute('width',nd.w);r.setAttribute('height',nd.h);
  r.setAttribute('rx','8');r.setAttribute('fill',m.fill);r.setAttribute('stroke',m.stroke);r.setAttribute('stroke-width','2');
  g.appendChild(r);

  // Module tag
  if(nd.mod!=='file'){
    const mt=document.createElementNS('http://www.w3.org/2000/svg','text');
    mt.setAttribute('x',nd.x+10);mt.setAttribute('y',nd.y+13);
    mt.setAttribute('font-size','8');mt.setAttribute('font-weight','700');mt.setAttribute('fill',m.text);
    mt.setAttribute('opacity','0.7');mt.setAttribute('letter-spacing','0.3');
    mt.textContent=modNames[nd.mod]||'';
    g.appendChild(mt);
  }

  // Function name
  const fn=document.createElementNS('http://www.w3.org/2000/svg','text');
  const nameY = nd.mod==='file' ? nd.y+nd.h/2+1 : nd.y + (nd.sub ? nd.h*0.5 : nd.h*0.55);
  fn.setAttribute('x',nd.x+nd.w/2);fn.setAttribute('y',nameY);
  fn.setAttribute('text-anchor','middle');
  fn.setAttribute('font-size', nd.mod==='file'?'11':'12');
  fn.setAttribute('font-weight','700');
  fn.setAttribute('font-family','Consolas, "SF Mono", monospace');
  fn.setAttribute('fill',nd.mod==='file'?m.text:'#1e293b');
  fn.textContent=nd.label;
  g.appendChild(fn);

  // Sub description
  if(nd.sub){
    const sd=document.createElementNS('http://www.w3.org/2000/svg','text');
    sd.setAttribute('x',nd.x+nd.w/2);sd.setAttribute('y',nameY+13);
    sd.setAttribute('text-anchor','middle');
    sd.setAttribute('font-size','9');sd.setAttribute('fill','#64748b');
    // Truncate if too long
    const maxChars = Math.floor(nd.w / 5.2);
    sd.textContent = nd.sub.length > maxChars ? nd.sub.slice(0,maxChars-1)+'...' : nd.sub;
    g.appendChild(sd);
  }

  nodeGroup.appendChild(g);
  nodeEls[nd.id] = { group: g, box: r };
}


// ===================== DETAIL PANEL =====================

const panel = document.getElementById('detail-panel');
let selectedNode = null;

function selectNode(id) {
  const nd = N[id];
  if (!nd || !nd.details) return;
  selectedNode = id;
  const m = MOD[nd.mod];

  // Header
  const modTag = document.getElementById('dp-mod-tag');
  modTag.textContent = modNames[nd.mod] || nd.mod.toUpperCase();
  modTag.style.background = m.fill;
  modTag.style.color = m.text;
  modTag.style.border = '1px solid ' + m.stroke;

  document.getElementById('dp-fn-name').textContent = nd.label;
  document.getElementById('dp-sub').textContent = nd.sub;

  // Header colored bar
  document.querySelector('#detail-panel .dp-header').style.borderBottom = '3px solid ' + m.stroke;

  // Inputs
  const inputsSec = document.getElementById('dp-inputs-sec');
  const inputsUl = document.getElementById('dp-inputs');
  inputsUl.innerHTML = '';
  if (nd.details.inputs && nd.details.inputs.length > 0) {
    inputsSec.style.display = '';
    nd.details.inputs.forEach(inp => {
      const li = document.createElement('li');
      li.textContent = inp;
      inputsUl.appendChild(li);
    });
  } else {
    inputsSec.style.display = 'none';
  }

  // Output
  const outputSec = document.getElementById('dp-output-sec');
  const outputP = document.getElementById('dp-output');
  if (nd.details.outputs) {
    outputSec.style.display = '';
    outputP.textContent = nd.details.outputs;
  } else {
    outputSec.style.display = 'none';
  }

  // Logic
  const logicSec = document.getElementById('dp-logic-sec');
  const logicP = document.getElementById('dp-logic');
  if (nd.details.logic) {
    logicSec.style.display = '';
    logicP.textContent = nd.details.logic;
  } else {
    logicSec.style.display = 'none';
  }

  // Connections (auto-derived from edges)
  const connDiv = document.getElementById('dp-connections');
  connDiv.innerHTML = '';
  const incoming = edges.filter(e => e.to === id);
  const outgoing = edges.filter(e => e.from === id);

  if (incoming.length === 0 && outgoing.length === 0) {
    document.getElementById('dp-conn-sec').style.display = 'none';
  } else {
    document.getElementById('dp-conn-sec').style.display = '';
    incoming.forEach(e => {
      const src = N[e.from];
      if (!src) return;
      const row = document.createElement('div');
      row.className = 'dp-conn-row';
      const arrow = document.createElement('span');
      arrow.className = 'dp-conn-arrow';
      arrow.textContent = '\u2190';
      row.appendChild(arrow);
      const lbl = document.createElement('span');
      lbl.textContent = 'from ';
      row.appendChild(lbl);
      const link = document.createElement('span');
      link.className = 'dp-conn-link';
      link.textContent = src.label;
      link.onclick = () => selectNode(e.from);
      row.appendChild(link);
      if (e.label) {
        const edgeLbl = document.createElement('span');
        edgeLbl.style.cssText = 'color:#94a3b8;font-size:10px;margin-left:4px';
        edgeLbl.textContent = '(' + e.label + ')';
        row.appendChild(edgeLbl);
      }
      connDiv.appendChild(row);
    });
    outgoing.forEach(e => {
      const tgt = N[e.to];
      if (!tgt) return;
      const row = document.createElement('div');
      row.className = 'dp-conn-row';
      const arrow = document.createElement('span');
      arrow.className = 'dp-conn-arrow';
      arrow.textContent = '\u2192';
      row.appendChild(arrow);
      const lbl = document.createElement('span');
      lbl.textContent = 'to ';
      row.appendChild(lbl);
      const link = document.createElement('span');
      link.className = 'dp-conn-link';
      link.textContent = tgt.label;
      link.onclick = () => selectNode(e.to);
      row.appendChild(link);
      if (e.label) {
        const edgeLbl = document.createElement('span');
        edgeLbl.style.cssText = 'color:#94a3b8;font-size:10px;margin-left:4px';
        edgeLbl.textContent = '(' + e.label + ')';
        row.appendChild(edgeLbl);
      }
      connDiv.appendChild(row);
    });
  }

  // Open panel
  panel.classList.add('open');

  // Highlight selected node, dim others
  const connected = new Set([id]);
  incoming.forEach(e => connected.add(e.from));
  outgoing.forEach(e => connected.add(e.to));

  for (const nid in nodeEls) {
    const el = nodeEls[nid];
    if (nid === id) {
      el.box.setAttribute('stroke-width', '3');
      el.box.setAttribute('filter', 'drop-shadow(0 0 6px ' + MOD[N[nid].mod].stroke + ')');
      el.group.style.opacity = '1';
    } else if (connected.has(nid)) {
      el.box.setAttribute('stroke-width', '2');
      el.box.removeAttribute('filter');
      el.group.style.opacity = '1';
    } else {
      el.box.setAttribute('stroke-width', '2');
      el.box.removeAttribute('filter');
      el.group.style.opacity = '0.3';
    }
  }
}

function closePanel() {
  panel.classList.remove('open');
  selectedNode = null;
  // Reset all node highlights
  for (const nid in nodeEls) {
    const el = nodeEls[nid];
    el.box.setAttribute('stroke-width', '2');
    el.box.removeAttribute('filter');
    el.group.style.opacity = '1';
  }
}

// Click handlers on nodes
for (const nid in nodeEls) {
  const el = nodeEls[nid];
  el.group.addEventListener('click', ev => {
    ev.stopPropagation();
    if (N[nid].details) selectNode(nid);
  });
}

// Close panel: X button, Escape, canvas background click
document.getElementById('dp-close').addEventListener('click', closePanel);
document.addEventListener('keydown', ev => {
  if (ev.key === 'Escape' && selectedNode) closePanel();
});

// Close on canvas background click (only if not dragging)
let clickStart = null;
wrap.addEventListener('mousedown', ev => { clickStart = { x: ev.clientX, y: ev.clientY }; });
wrap.addEventListener('mouseup', ev => {
  if (!clickStart) return;
  const dx = Math.abs(ev.clientX - clickStart.x);
  const dy = Math.abs(ev.clientY - clickStart.y);
  // Only close if it was a click (not a drag) on the background
  if (dx < 5 && dy < 5 && selectedNode && (ev.target === svgEl || ev.target === bg)) {
    closePanel();
  }
  clickStart = null;
});


// ===================== PAN & ZOOM =====================

let scale=1, tx=0, ty=0;
let dragging=false, dragX=0, dragY=0;

function applyTransform(){
  svgEl.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  svgEl.style.transformOrigin='0 0';
  document.getElementById('zoom-label').textContent=Math.round(scale*100)+'%';
}

function fitToScreen(){
  const vw=wrap.clientWidth, vh=wrap.clientHeight;
  const sx=vw/CW, sy=vh/CH;
  scale=Math.min(sx,sy)*0.92;
  tx=(vw-CW*scale)/2;
  ty=(vh-CH*scale)/2;
  applyTransform();
}

wrap.addEventListener('mousedown',ev=>{
  if(ev.button!==0)return;
  dragging=true; dragX=ev.clientX-tx; dragY=ev.clientY-ty;
  wrap.classList.add('grabbing');
});
window.addEventListener('mousemove',ev=>{
  if(!dragging)return;
  tx=ev.clientX-dragX; ty=ev.clientY-dragY;
  applyTransform();
});
window.addEventListener('mouseup',()=>{dragging=false;wrap.classList.remove('grabbing');});

wrap.addEventListener('wheel',ev=>{
  ev.preventDefault();
  const rect=wrap.getBoundingClientRect();
  const mx=ev.clientX-rect.left, my=ev.clientY-rect.top;
  const d=ev.deltaY>0?0.9:1.1;
  const ns=Math.max(0.15,Math.min(4,scale*d));
  // Zoom toward cursor
  tx=mx-(mx-tx)*(ns/scale);
  ty=my-(my-ty)*(ns/scale);
  scale=ns;
  applyTransform();
},{passive:false});

document.getElementById('btn-zin').onclick=()=>{scale=Math.min(4,scale*1.2);applyTransform()};
document.getElementById('btn-zout').onclick=()=>{scale=Math.max(0.15,scale/1.2);applyTransform()};
document.getElementById('btn-fit').onclick=fitToScreen;
document.getElementById('btn-reset').onclick=()=>{scale=1;tx=0;ty=0;applyTransform()};

// Initial fit
fitToScreen();
